
# Example password prompt step
- type: intro
  text: "Password Example"

- type: password
  prompt: "Enter your password"
  mask: "▪"
  output: "user_password"
  confirm_password: true
  confirm_prompt: "Please re-enter your password to confirm"
  validate:
    - type: not-empty
      message: "Password cannot be empty"
    - type: min-length
      length: 8
      message: "Password must be at least 8 characters long"

- type: outro
  text: "Password saved successfully!"
